name: MLBriefing Daily

on:
  schedule:
    - cron: '0 5 * * *'    # 05:00 UTC = 07:00 CET (zomertijd)
  workflow_dispatch:

jobs:
  briefing:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Python dependencies installeren
        run: pip install -r requirements.txt

      - name: Dagelijkse briefing genereren
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/build_daily_data.py

      - name: Data committen en pushen
        run: |
          git config user.name "MLBriefing Bot"
          git config user.email "bot@mlbriefing.github.io"
          git add data/
          git diff --cached --quiet || git commit -m "📊 Briefing $(date +%Y-%m-%d)"
          git push

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Frontend dependencies installeren
        run: npm ci

      - name: Frontend bouwen
        run: npm run build

      - name: GitHub Pages deployen
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          cname: ''   # Leeg laten of vul je eigen domein in
