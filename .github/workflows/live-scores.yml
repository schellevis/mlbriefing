name: MLB Live Scores

# Fase 2 — optioneel. Schakel in door workflow_dispatch te gebruiken of de
# schedule hieronder te uncommenten.
on:
  workflow_dispatch:
  # schedule:
  #   # Elke 30 min van 18:00-06:00 CET (16:00-04:00 UTC) — MLB game window
  #   - cron: '*/30 16-23 * * *'
  #   - cron: '*/30 0-4 * * *'

jobs:
  scores:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Python dependencies installeren
        run: pip install -r requirements.txt

      - name: Live scores ophalen (alleen op game days)
        run: python scripts/fetch_live_scores.py

      - name: Data committen (alleen als er wijzigingen zijn)
        run: |
          git config user.name "MLBriefing Bot"
          git config user.email "bot@mlbriefing.github.io"
          git add data/live/
          git diff --cached --quiet || (git commit -m "⚾ Live $(date +%H:%M)" && git push)
